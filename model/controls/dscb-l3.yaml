- id: DSCB-L3-REQ-009
  domain: end_to_end_traceability
  title: End-to-End Traceability
  control_objective: Ensure traceability across the complete software lifecycle.
  requirement: Traceability SHALL exist between requirements, source code, verification Cases / Procedures and Test result, build artifacts, and
    deployed software.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - end_to_end_traceability
  - deployment_metadata
  - evidence_graph
  evidence:
  - traceability_records
  - deployment_metadata
  verification:
    method: hybrid
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_review
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
- id: DSCB-L3-REQ-010
  domain: runtime_integrity_verification
  title: Runtime Integrity Verification
  control_objective: Ensure operational systems verify software integrity.
  requirement: Runtime environments SHALL verify the integrity of deployed software artifacts.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - runtime_integrity_verification
  - deployment_traceability
  evidence:
  - runtime_integrity_verification_logs
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: true
    enforcement: evidence_review
  waiver:
    allowed: true
    authority: CISO
- id: DSCB-L3-REQ-011
  domain: continuous_compliance_evidence
  title: Continuous Compliance Evidence
  control_objective: Ensure DevSecOps pipelines produce compliance evidence automatically.
  requirement: DevSecOps platforms SHALL generate machine-readable compliance evidence for lifecycle activities.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - continuous_compliance_evidence
  - compliance_evidence_repository
  - pipeline_audit_logs
  evidence:
  - compliance_evidence_repository
  - pipeline_audit_records
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
