level: L3
name: Trusted Software Supply Chain / SDD
required_platform_level: PRA-Level 3
requirements:
- id: DSCB-L3-REQ-001
  domain: deterministic_builds
  title: Deterministic Builds
  control_objective: Ensure reproducible software builds.
  requirement: Software builds SHALL be reproducible using identical source code and build configuration.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - reproducible_build_verification
  - version_controlled_build_configuration
  evidence:
  - rebuild_verification_records
  - build_configuration_records
  verification:
    method: hybrid
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_review
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
- id: DSCB-L3-REQ-002
  domain: deterministic_builds
  title: Deterministic Builds
  control_objective: Ensure reproducible software builds.
  requirement: Build configurations SHALL be version controlled.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - reproducible_build_verification
  - version_controlled_build_configuration
  evidence:
  - rebuild_verification_records
  - build_configuration_records
  verification:
    method: hybrid
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_review
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
- id: DSCB-L3-REQ-003
  domain: build_environment_isolation
  title: Build Environment Isolation
  control_objective: Ensure build environments are protected against manipulation.
  requirement: Software builds SHALL be executed in isolated build environments.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - isolated_build_environment
  - recreatable_build_environment
  evidence:
  - build_environment_configuration
  - pipeline_execution_records
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: true
    enforcement: evidence_review
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
- id: DSCB-L3-REQ-004
  domain: build_environment_isolation
  title: Build Environment Isolation
  control_objective: Ensure build environments are protected against manipulation.
  requirement: Build environments SHALL be recreated for each pipeline execution.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - isolated_build_environment
  - recreatable_build_environment
  evidence:
  - build_environment_configuration
  - pipeline_execution_records
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: true
    enforcement: evidence_review
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
- id: DSCB-L3-REQ-005
  domain: dependency_provenance
  title: Dependency Provenance
  control_objective: Ensure verifiable origin of software dependencies.
  requirement: Software dependencies SHALL include verifiable provenance information.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - provenance_capture
  - trusted_dependency_sourcing
  - dependency_records
  evidence:
  - provenance_metadata
  - dependency_records
  verification:
    method: hybrid
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_review
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
- id: DSCB-L3-REQ-006
  domain: dependency_provenance
  title: Dependency Provenance
  control_objective: Ensure verifiable origin of software dependencies.
  requirement: Dependency provenance SHALL be recorded during the build process.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - provenance_capture
  - trusted_dependency_sourcing
  - dependency_records
  evidence:
  - provenance_metadata
  - dependency_records
  verification:
