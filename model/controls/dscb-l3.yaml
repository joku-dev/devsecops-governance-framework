- id: DSCB-L3-REQ-007
  domain: trusted_artifact_signing
  title: Trusted Artifact Signing
  control_objective: Ensure artifacts are signed using enterprise-managed trust infrastructure.
  requirement: Software artifacts SHALL be signed using enterprise signing infrastructure.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - enterprise_trust_infrastructure
  - central_signing_key_management
  - artifact_signature_logs
  evidence:
  - signing_infrastructure_records
  - artifact_signature_logs
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: true
    enforcement: evidence_review
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
- id: DSCB-L3-REQ-008
  domain: trusted_artifact_signing
  title: Trusted Artifact Signing
  control_objective: Ensure artifacts are signed using enterprise-managed trust infrastructure.
  requirement: Signing keys SHALL be centrally managed.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - enterprise_trust_infrastructure
  - central_signing_key_management
  - artifact_signature_logs
  evidence:
  - signing_infrastructure_records
  - artifact_signature_logs
