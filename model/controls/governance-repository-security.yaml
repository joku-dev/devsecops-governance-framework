schema_version: 0.1.0
profile_id: governance-repository-self-security
version: 0.2.0
title: Governance Repository Self-Security Profile
status: active_report_only
repository_id: joku-dev/devsecops-governance-framework
source_documents:
  - docs/governance/source-documents/DSCB-STD-SRC-001.public.md
  - docs/governance/source-documents/PRA-STD-SRC-001.public.md
owner: governance-owners
enforcement: report_only
enforcement_change_authorized: false
purpose: Protect the governance authority against unreviewed mutation, workflow supply-chain compromise, credential exposure, and unverifiable releases.
principles:
  - id: protect_the_authority
    statement: Consumer governance is trustworthy only when the repository that defines and distributes it is independently protected.
  - id: externalize_root_controls
    statement: Branch rules, security features, and organization policies must remain effective even if repository content is modified.
  - id: separate_normative_and_operational_writes
    statement: Automated evidence intake must not receive unrestricted authority to change normative governance.
  - id: fail_visible
    statement: Missing or inaccessible repository-security evidence is a failed criterion, never an implicit pass.
