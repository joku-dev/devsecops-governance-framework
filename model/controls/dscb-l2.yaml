- id: DSCB-L2-REQ-005
  domain: dependency_source_control
  title: Dependency Source Control
  control_objective: Ensure software dependencies originate from trusted repositories.
  requirement: Software dependencies SHALL be retrieved from approved repositories.
  required_platform_level: PRA-Level 2
  platform_capabilities:
