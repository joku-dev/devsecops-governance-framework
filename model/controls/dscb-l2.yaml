  domain: devsecops_platform_access_control
  title: DevSecOps Platform Access Control
  control_objective: Ensure secure access to DevSecOps platforms.
  requirement: Multi-factor authentication SHALL be enforced for privileged access.
  required_platform_level: PRA-Level 2
