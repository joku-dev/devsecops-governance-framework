schema_version: "0.1.0"
mapping_id: CISO-HARMONIZED-REQUIREMENTS-TO-MATURITY-LEVELS
title: Harmonized Requirements Candidate Maturity Assignment
status: candidate
normative: false
enforcement: none
source_document_id: CISO-REQ-SRC-001
requirements_model_id: CISO-HARMONIZED-DEVSECOPS-REQUIREMENTS
cumulative_levels: true
derivation_policy: review_only
level_definitions:
  L1:
    name: Foundational
    intent: Establish repeatable minimum security practices and evidence for all applicable software.
  L2:
    name: Managed
    intent: Add centrally managed capabilities, standardized verification, monitoring, and enforceable gates.
  L3:
    name: High Assurance
    intent: Add isolation, provenance, continuous verification, and machine-readable high-assurance evidence.
  GOV:
    name: Governance Overlay
    intent: Govern applicability, accountability, review, deviations, and lifecycle decisions across all maturity levels.
decision_required:
  - Confirm the minimum maturity level for every harmonized requirement.
  - Confirm risk-based and capability-based applicability independently of maturity.
  - Confirm whether governance-overlay requirements apply to every adopted level.
  - Approve any derived control, evidence, policy, or release change separately.
