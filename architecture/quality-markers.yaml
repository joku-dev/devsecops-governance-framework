source_document: docs/governance/source-documents/ARCH-SDD-SRC-001.public.md
model_version: 0.1.0
description: >
  Machine-readable runtime governance marker catalogue derived from the
  SDD Architecture Governance Framework. This file is an addendum and does
  not replace the source document.
scoring:
  scale:
  - score: 0
    name: Missing
    runtime_interpretation: No evidence exists.
  - score: 1
    name: Mentioned
    runtime_interpretation: Topic is named but not usable for governance decisions.
  - score: 2
    name: Described
    runtime_interpretation: Architecture description exists but ownership or executable process may be weak.
  - score: 3
    name: Designed and owned
    runtime_interpretation: Minimum level for architecture readiness.
  - score: 4
    name: Verified
    runtime_interpretation: Minimum level for release-critical markers.
  - score: 5
    name: Continuously measured and improved
    runtime_interpretation: Target level for operation-critical markers.
