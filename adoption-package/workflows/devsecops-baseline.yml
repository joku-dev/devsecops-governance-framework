name: DevSecOps Baseline

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: read

jobs:
  prepare-evidence:
    name: Prepare Evidence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout application repository
        uses: actions/checkout@v4

      - name: Build artifact and evidence
        run: |
          mkdir -p dist security governance
          tar --exclude='.git' -czf dist/application-source.tar.gz .

          cat > security/sbom.cyclonedx.json <<'JSON'
          {
            "bomFormat": "CycloneDX",
            "specVersion": "1.5",
            "version": 1,
            "metadata": {
              "component": {
                "type": "application",
                "name": "application"
              }
            },
            "components": []
          }
          JSON

          cat > security/vulnerability-scan.json <<'JSON'
          {
            "scanner": "placeholder",
            "max_severity": "none",
            "findings": []
          }
          JSON

          cat > governance/governance-run-input.json <<'JSON'
          {
            "contract_version": "1.0",
            "release_candidate": true,
            "run_context": {
              "event": "pull_request",
              "purpose": "pull_request_validation",
              "release_context": false,
              "source": "adoption-package"
            },
            "required_platform_level": "PRA-Level 1",
            "repository": {
              "protected_branch": true,
              "direct_push_allowed": false,
              "review_required": true
            },
            "traceability": {
              "requirements_linked": false,
              "testcases_linked": false,
              "reports_linked": false
            },
            "source_control": {
              "approved_vcs": true,
              "identifiable_authors": true,
              "review_records_present": true
            },
            "static_analysis": {
              "performed": false,
              "findings_reviewed": false
            },
            "evidence": {
              "sbom": {
                "exists": true,
                "linked_to_artifact": true
              },
              "vulnerability_scan": {
                "exists": true,
                "path": "security/vulnerability-scan.json",
                "max_severity": "none"
              }
            },
            "artifact": {
              "artifact_id": "application-source.tar.gz",
              "artifact_type": "application-source",
              "artifact_version": "replace-with-commit-or-version",
              "digest": {
                "exists": true,
                "linked_to_artifact": true,
                "algorithm": "sha256",
                "value": "replace-with-generated-digest"
              },
              "signature": {
                "exists": false
              }
            },
            "pipeline": {
              "pipeline_id": "DevSecOps Baseline",
              "pipeline_run_id": "replace-with-run-id",
              "commit_id": "replace-with-commit-id",
              "event": "pull_request",
              "status": "success",
              "security_gates": {
                "enforced": false
              },
              "security_thresholds_exceeded": false,
              "external_direct_downloads_detected": false
            },
            "operations": {
              "deployed_versions_recorded": false,
              "security_events_recorded": false
            },
            "waivers": []
          }
          JSON

      - name: Upload application evidence
        uses: actions/upload-artifact@v4
        with:
          name: application-evidence
          path: |
            dist/application-source.tar.gz
            security/sbom.cyclonedx.json
            security/vulnerability-scan.json
            governance/governance-run-input.json

  devsecops-baseline:
    name: Central DevSecOps Baseline
    needs: prepare-evidence
    uses: joku-dev/devsecops-governance-framework/.github/workflows/devsecops-baseline-l1-v1.1.3.yml@l1-baseline-v1.1.3
    with:
      governance_mode: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'block-on-error' || 'report-only' }}
      max_allowed_severity: high
      artifact_path: dist/application-source.tar.gz
      sbom_path: security/sbom.cyclonedx.json
      vulnerability_scan_path: security/vulnerability-scan.json
      governance_run_input_path: governance/governance-run-input.json
      application_evidence_artifact_name: application-evidence
      generate_demo_evidence: false
