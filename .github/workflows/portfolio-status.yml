name: Refresh Portfolio Onboarding Status

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: portfolio-status
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out governance repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: python -m pip install -r requirements-validation.txt

      - name: Set up OPA
        uses: open-policy-agent/setup-opa@v2.4.0
        with:
          version: 1.18.2

      - name: Regenerate portfolio status
        run: python3 scripts/generate_portfolio_onboarding_status.py

      - name: Validate generated state
        run: |
          python3 scripts/validate_governance_repo.py
          python3 -m unittest discover -s tests

      - name: Commit refreshed portfolio status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            git reset --mixed HEAD
            git pull --rebase --autostash origin main
            python3 scripts/generate_portfolio_onboarding_status.py
            git add generated/reports/portfolio-onboarding-status.json generated/reports/portfolio-onboarding-status.md
            if git diff --cached --quiet; then
              echo "No semantic portfolio status changes."
              exit 0
            fi
            git commit -m "Refresh portfolio onboarding status"
            if git push; then
              exit 0
            fi
            git reset --soft HEAD~1
            sleep $((attempt * 2))
          done

          echo "Could not push portfolio status after retries."
          exit 1
