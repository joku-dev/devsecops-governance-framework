name: Refresh Portfolio Onboarding Status

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: portfolio-status
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out governance repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: python -m pip install -r requirements-validation.txt

      - name: Regenerate portfolio and status projections
        run: |
          python3 scripts/generate_repository_results_index.py
          python3 scripts/generate_architecture_results_index.py
          python3 scripts/generate_typed_evidence_results_index.py
          python3 scripts/generate_portfolio_onboarding_status.py
          python3 scripts/generate_governance_graph.py
          python3 scripts/generate_status_viewer.py

      - name: Validate generated state
        run: |
          python3 scripts/validate_governance_repo.py
          python3 -m unittest discover -s tests

      - name: Commit refreshed portfolio status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status generated .github/workflows/portfolio-status.yml
          if git diff --cached --quiet; then
            echo "No portfolio status changes."
            exit 0
          fi
          git commit -m "Refresh portfolio onboarding status"
          git push
