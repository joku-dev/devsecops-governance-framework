name: Publish Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "generated/viewer/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "scripts/generate_status_viewer.py"
      - "scripts/generate_governance_graph.py"
      - "generated/graph/**"
      - "status/**"
      - ".github/workflows/publish-docs.yml"
  workflow_dispatch:
    inputs:
      publish_private_pages:
        description: "Deploy Pages even when the repository is private"
        required: false
        default: "false"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish-docs:
    if: ${{ !github.event.repository.private || inputs.publish_private_pages == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"

      - name: Install MkDocs
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-docs.txt

      - name: Generate governance viewer artifacts
        run: |
          python3 scripts/generate_governance_graph.py
          python3 scripts/generate_status_viewer.py

      - name: Build docs site
        run: |
          mkdocs build --strict
          mkdir -p site/generated
          cp -R generated/. site/generated/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6.0.0
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
