name: Intake Typed Evidence Trust

on:
  workflow_dispatch:
    inputs:
      repository_id:
        description: Downstream repository in owner/name form.
        required: true
        default: joku-dev/governance-framework-demo-consumer
        type: string
      run_id:
        description: GitHub Actions run ID containing application-evidence.
        required: true
        type: string
      artifact_name:
        description: Artifact containing the typed Trust record and its subjects.
        required: false
        default: application-evidence
        type: string
  repository_dispatch:
    types:
      - typed-evidence-trust-ready

permissions:
  contents: write
  actions: read

concurrency:
  group: typed-evidence-trust-intake-${{ github.event.client_payload.repository_id || inputs.repository_id }}-${{ github.event.client_payload.run_id || inputs.run_id }}
  cancel-in-progress: false

jobs:
  intake-evidence-trust:
    runs-on: ubuntu-latest
    steps:
      - name: Check out governance repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-validation.txt

      - name: Set up OPA
        uses: open-policy-agent/setup-opa@b2b258e089860efaadaaf71bf6e3aecb4a3eeff1 # v2.4.0
        with:
          version: 1.18.2

      - name: Start intake telemetry
        id: telemetry_start
        run: echo "started_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Intake and centrally verify typed evidence
        id: intake
        continue-on-error: true
        env:
          GH_RESULT_INTAKE_TOKEN: ${{ secrets.GH_RESULT_INTAKE_TOKEN || github.token }}
          REPOSITORY_ID: ${{ github.event.client_payload.repository_id || inputs.repository_id }}
          RUN_ID: ${{ github.event.client_payload.run_id || inputs.run_id }}
          ARTIFACT_NAME: ${{ github.event.client_payload.artifact_name || inputs.artifact_name || 'application-evidence' }}
        run: |
          if [ -z "${REPOSITORY_ID}" ] || [ -z "${RUN_ID}" ]; then
            echo "repository_id and run_id are required"
            exit 1
          fi
          python3 scripts/intake_evidence_trust_github_actions_run.py \
            --repository-id "${REPOSITORY_ID}" \
            --run-id "${RUN_ID}" \
            --artifact-name "${ARTIFACT_NAME}"

      - name: Stop intake telemetry clock
        id: telemetry_stop
        if: always()
        run: echo "completed_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Record failed collection attempt
        if: steps.intake.outcome == 'failure'
        env:
          GH_RESULT_INTAKE_TOKEN: ${{ secrets.GH_RESULT_INTAKE_TOKEN || github.token }}
          REPOSITORY_ID: ${{ github.event.client_payload.repository_id || inputs.repository_id }}
          RUN_ID: ${{ github.event.client_payload.run_id || inputs.run_id }}
          ARTIFACT_NAME: ${{ github.event.client_payload.artifact_name || inputs.artifact_name || 'application-evidence' }}
        run: |
          python3 scripts/record_collection_attempt.py \
            --repository-id "${REPOSITORY_ID}" \
            --run-id "${RUN_ID}" \
            --evidence-type vulnerability_scan \
            --collector-id central-vulnerability-scan-collector \
            --artifact-name "${ARTIFACT_NAME}" \
            --error-code typed_evidence_intake_failed \
            --message "Typed evidence intake failed; inspect the workflow log for the detailed cause." \
            --retryable

      - name: Record intake telemetry
        id: telemetry
        if: always()
        env:
          REPOSITORY_ID: ${{ github.event.client_payload.repository_id || inputs.repository_id }}
          RUN_ID: ${{ github.event.client_payload.run_id || inputs.run_id }}
          ARTIFACT_NAME: ${{ github.event.client_payload.artifact_name || inputs.artifact_name || 'application-evidence' }}
          INTAKE_STATUS: ${{ steps.intake.outcome == 'success' && 'success' || 'failed' }}
          STARTED_AT: ${{ steps.telemetry_start.outputs.started_at }}
          COMPLETED_AT: ${{ steps.telemetry_stop.outputs.completed_at }}
        run: |
          args=(
            --repository-id "${REPOSITORY_ID}"
            --run-id "${RUN_ID}"
            --evidence-type vulnerability_scan
            --collector-id central-vulnerability-scan-collector
            --artifact-name "${ARTIFACT_NAME}"
            --intake-type typed_evidence
            --status "${INTAKE_STATUS}"
            --started-at "${STARTED_AT}"
            --completed-at "${COMPLETED_AT}"
          )
          if [ "${INTAKE_STATUS}" = "failed" ]; then
            args+=(
              --error-code typed_evidence_intake_failed
              --message "Typed evidence intake failed; inspect the workflow log for the detailed cause."
            )
          fi
          python3 scripts/record_intake_event.py "${args[@]}"

      - name: Regenerate typed evidence index and viewer
        id: regenerate
        if: always()
        run: |
          python3 scripts/generate_typed_evidence_results_index.py
          python3 scripts/generate_intake_health.py
          python3 scripts/generate_multi_consumer_readiness.py
          python3 scripts/generate_governance_graph.py
          python3 scripts/generate_replay_triage_report.py
          python3 scripts/generate_blocking_readiness.py
          python3 scripts/generate_blocking_mode_alignment.py
          python3 scripts/generate_status_viewer.py

      - name: Validate generated state
        id: validation
        if: always()
        run: |
          python3 scripts/validate_runtime_governance.py
          python3 scripts/validate_governance_repo.py
          python3 -m unittest discover -s tests

      - name: Commit intake result
        if: always() && steps.regenerate.outcome == 'success' && steps.validation.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            echo "Commit/push attempt ${attempt}"
            git reset --mixed HEAD
            git pull --rebase --autostash origin main
            python3 scripts/generate_repository_results_index.py
            python3 scripts/generate_architecture_results_index.py
            python3 scripts/generate_typed_evidence_results_index.py
            python3 scripts/generate_intake_health.py
            python3 scripts/generate_multi_consumer_readiness.py
            python3 scripts/generate_governance_graph.py
            python3 scripts/generate_replay_triage_report.py
            python3 scripts/generate_blocking_readiness.py
            python3 scripts/generate_blocking_mode_alignment.py
            python3 scripts/generate_status_viewer.py

            git add status/typed-evidence-results status/collection-attempts status/intake-events status/intake-conflicts status/intake-health.json status/typed-evidence-results-index.json generated/graph/governance-graph.json generated/reports/blocking-mode-alignment.json generated/reports/blocking-readiness.json generated/reports/multi-consumer-readiness.json generated/reports/multi-consumer-readiness.md generated/reports/replay-triage.json generated/reports/replay-triage.md generated/viewer/status-viewer.html
            if git diff --cached --quiet; then
              echo "No typed evidence changes to commit."
              exit 0
            fi

            git commit -m "Intake typed evidence Trust result"
            if git push; then
              exit 0
            fi

            echo "Push failed, retrying after rebasing onto current main."
            git reset --soft HEAD~1
            sleep $((attempt * 2))
          done

          echo "Could not push typed evidence intake result after retries."
          exit 1

      - name: Fail workflow after intake or telemetry failure
        if: steps.intake.outcome == 'failure' || steps.telemetry.outcome == 'failure'
        run: exit 1
