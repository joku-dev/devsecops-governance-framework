name: Intake Typed Evidence Trust

on:
  workflow_dispatch:
    inputs:
      repository_id:
        description: Downstream repository in owner/name form.
        required: true
        default: joku-dev/governance-framework-demo-consumer
        type: string
      run_id:
        description: GitHub Actions run ID containing application-evidence.
        required: true
        type: string
      artifact_name:
        description: Artifact containing the typed Trust record and its subjects.
        required: false
        default: application-evidence
        type: string
  repository_dispatch:
    types:
      - typed-evidence-trust-ready

permissions:
  contents: write
  actions: read

concurrency:
  group: typed-evidence-trust-intake
  cancel-in-progress: false

jobs:
  intake-evidence-trust:
    runs-on: ubuntu-latest
    steps:
      - name: Check out governance repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-validation.txt

      - name: Set up OPA
        uses: open-policy-agent/setup-opa@v2.4.0
        with:
          version: 1.18.2

      - name: Intake and centrally verify typed evidence
        env:
          GH_RESULT_INTAKE_TOKEN: ${{ secrets.GH_RESULT_INTAKE_TOKEN || github.token }}
          REPOSITORY_ID: ${{ github.event.client_payload.repository_id || inputs.repository_id }}
          RUN_ID: ${{ github.event.client_payload.run_id || inputs.run_id }}
          ARTIFACT_NAME: ${{ github.event.client_payload.artifact_name || inputs.artifact_name || 'application-evidence' }}
        run: |
          if [ -z "${REPOSITORY_ID}" ] || [ -z "${RUN_ID}" ]; then
            echo "repository_id and run_id are required"
            exit 1
          fi
          python3 scripts/intake_evidence_trust_github_actions_run.py \
            --repository-id "${REPOSITORY_ID}" \
            --run-id "${RUN_ID}" \
            --artifact-name "${ARTIFACT_NAME}"

      - name: Regenerate typed evidence index and viewer
        run: |
          python3 scripts/generate_typed_evidence_results_index.py
          python3 scripts/generate_governance_graph.py
          python3 scripts/generate_status_viewer.py

      - name: Validate generated state
        run: |
          python3 scripts/validate_runtime_governance.py
          python3 scripts/validate_governance_repo.py
          python3 -m unittest discover -s tests

      - name: Commit intake result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            echo "Commit/push attempt ${attempt}"
            git reset --mixed HEAD
            git pull --rebase --autostash origin main
            python3 scripts/generate_repository_results_index.py
            python3 scripts/generate_architecture_results_index.py
            python3 scripts/generate_typed_evidence_results_index.py
            python3 scripts/generate_governance_graph.py
            python3 scripts/generate_status_viewer.py

            git add status/typed-evidence-results status/typed-evidence-results-index.json generated/graph/governance-graph.json generated/viewer/status-viewer.html
            if git diff --cached --quiet; then
              echo "No typed evidence changes to commit."
              exit 0
            fi

            git commit -m "Intake typed evidence Trust result"
            if git push; then
              exit 0
            fi

            echo "Push failed, retrying after rebasing onto current main."
            git reset --soft HEAD~1
            sleep $((attempt * 2))
          done

          echo "Could not push typed evidence intake result after retries."
          exit 1
