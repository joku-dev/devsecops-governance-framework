name: Governance CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-validation.txt
          python -m pip install -r requirements-docs.txt

      - name: Set up OPA
        uses: open-policy-agent/setup-opa@b2b258e089860efaadaaf71bf6e3aecb4a3eeff1 # v2.4.0
        with:
          version: 1.18.2

      - name: Validate repository model
        run: python3 scripts/validate_governance_repo.py

      - name: Run regression tests
        run: python3 -m unittest discover -s tests

      - name: Generate governance artifacts
        run: |
          python3 scripts/generate_traceability_csv.py
          python3 scripts/generate_document_control_matrix.py
          python3 scripts/generate_open_gap_report.py
          python3 scripts/render_governance_documents.py
          python3 scripts/generate_governance_graph.py
          python3 scripts/generate_status_viewer.py

      - name: Build docs site
        run: mkdocs build --strict

      - name: Upload generated artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: governance-reports
          path: |
            generated/xlsx/
            generated/reports/
            generated/documents/
            generated/graph/
            generated/viewer/
