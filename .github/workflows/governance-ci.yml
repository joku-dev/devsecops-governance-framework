name: Governance CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml jsonschema
          python -m pip install -r requirements-docs.txt

      - name: Set up OPA
        uses: open-policy-agent/setup-opa@v2.4.0
        with:
          version: latest

      - name: Validate repository model
        run: python3 scripts/validate_governance_repo.py

      - name: Run regression tests
        run: python3 -m unittest discover -s tests

      - name: Generate governance artifacts
        run: |
          python3 scripts/generate_traceability_csv.py
          python3 scripts/generate_document_control_matrix.py
          python3 scripts/generate_open_gap_report.py
          python3 scripts/render_governance_documents.py
          python3 scripts/generate_status_viewer.py

      - name: Build docs site
        run: mkdocs build --strict

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: governance-reports
          path: |
            generated/xlsx/
            generated/reports/
            generated/documents/
            generated/viewer/
