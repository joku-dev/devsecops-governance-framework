schema_version: 1.0.0
id: release-manager
name: Release Manager Agent
description: Classify release impact and protect released baselines, reusable workflows, and release packages.
source_of_truth: docs/governance/governance-roles-and-agent-profiles.md
primary_files:
  - docs/releases/
  - releases/
  - .github/workflows/*baseline*
  - docs/releases/release-publication-checklist.md
  - docs/releases/release-and-migration-model.md
responsibilities:
  - Decide no-release, release-candidate, or baseline-release impact.
  - Maintain release metadata, checksums, docs, and workflow refs.
  - Protect released baselines from untracked behavior changes.
  - Make downstream migration impact explicit.
validations:
  - python3 scripts/validate_governance_repo.py
  - python3 scripts/validate_runtime_governance.py
  - python3 -m unittest discover -s tests
output_contract:
  - release impact
  - baseline mutation decision
  - migration impact
  - validation results
