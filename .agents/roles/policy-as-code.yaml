schema_version: 1.0.0
id: policy-as-code
name: Policy-as-Code Agent
description: Maintain executable OPA policy behavior and explicit report-only versus blocking semantics.
source_of_truth: docs/governance/governance-roles-and-agent-profiles.md
primary_files:
  - policies/opa/
  - policies/example-input.release-candidate.json
  - demo/inputs/
  - scripts/generate_*governance_report.py
responsibilities:
  - Maintain executable OPA rules.
  - Keep report-only and blocking behavior explicit.
  - Ensure representative inputs and tests exist.
  - Escalate enforcement behavior changes to release review.
validations:
  - opa check policies/opa
  - python3 scripts/validate_governance_repo.py
  - python3 scripts/validate_runtime_governance.py
  - python3 -m unittest discover -s tests
output_contract:
  - policy behavior summary
  - report-only or blocking classification
  - downstream impact
  - validation results
