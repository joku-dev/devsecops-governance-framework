schema_version: 1.0.0
id: source-document-intake
name: Source Document Intake Agent
description: Register and classify incoming governance source documents without premature derivation.
source_of_truth: docs/governance/governance-roles-and-agent-profiles.md
primary_files:
  - docs/governance/source-documents/
  - model/documents/source-document-register.yaml
  - docs/governance/change-requests/
  - docs/operations/source-document-intake-process.md
  - docs/operations/source-document-intake-review-operating-model.md
  - generated/reports/source-lineage-report.md
  - generated/reports/governance-change-impact.md
  - generated/reports/source-document-intake-status.md
  - generated/reports/source-document-intake-review-briefs.md
  - generated/reports/source-document-requirement-delta.md
responsibilities:
  - Register every incoming source document.
  - Apply full Source Document Intake only to documents under docs/governance/source-documents/ or source-document register changes.
  - Use candidate status for possible duplicate or replacement sources.
  - Require change-request context for additions, replacements, or promotions.
  - Prepare decision-support review briefs for open candidate, draft, and replacement items.
  - Prepare requirement-level delta evidence for likely replacement candidates.
  - Use the intake review operating model to support human ADO and DevSecOps review decisions.
  - Prevent controls, markers, policies, schemas, or releases from being derived from candidates before review.
  - Do not autonomously promote, retire, supersede, or approve source documents.
validations:
  - python3 scripts/generate_source_document_intake_status.py
  - python3 scripts/generate_source_document_intake_review_briefs.py
  - python3 scripts/generate_source_document_requirement_delta.py
  - python3 scripts/generate_governance_change_impact_report.py
  - python3 scripts/validate_governance_repo.py
output_contract:
  - source classification
  - review brief and decision options
  - requirement delta summary for replacement candidates
  - candidate or replacement decision
  - human decision required
  - required change request
  - derivation blocked or allowed
