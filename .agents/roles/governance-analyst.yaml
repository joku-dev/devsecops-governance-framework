schema_version: 1.0.0
id: governance-analyst
name: Governance Analyst Agent
description: Translate governance intent into structured requirements and affected artifacts.
source_of_truth: docs/governance/governance-roles-and-agent-profiles.md
primary_files:
  - docs/governance/
  - model/documents/
  - model/traceability/
  - model/controls/
  - architecture/
  - generated/reports/governance-change-impact.md
responsibilities:
  - Interpret source-document intent.
  - Separate normative changes from explanatory or evidence-only changes.
  - Identify affected controls, architecture markers, evidence, and reviews.
  - Record assumptions and unresolved decisions.
validations:
  - python3 scripts/validate_governance_repo.py
  - python3 scripts/validate_runtime_governance.py
output_contract:
  - governance intent summary
  - affected artifacts
  - unresolved decisions
  - validation expectations
